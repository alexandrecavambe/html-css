<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação Por Secção</title>
    <style>
        html{
            scroll-behavior: smooth;
        }
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
    body{
        font-family: Arial, Helvetica, sans-serif;
        
    }

    header{
        display: flex;
        justify-content: space-between;
        align-items: center;


        background-color: blueviolet;
        padding: 30px;
        border-radius: 10px;
        width: 95%;

        position: fixed;
        top: 5px;
        
        left: 50%;
        transform: translateX(-50%);
        

        h2{
            color: #fff;
            font-size: 1.2rem;
        }

        nav{
            gap: 30px;

            #nav-list{
                display: flex;
                list-style: none;
                gap: 20px;


                .nav-item{
                    
                    a{
                        color: #fff;
                        font-weight: bold;
                        text-decoration: none;
                        padding: 8px;
                        gap: 30px;
                        transition: 0.3s;
                        border-radius: 5px;

                        &:hover{
                            background-color: #000;
                            color: #fff;
                        }

                        
                    }
                }
            }
            
        }

    }

    section{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px; 
        }

    #about{
        background-color: aquamarine;
    }
    #project{
        background-color: violet;
    }
    #contact{
        background-color: slateblue;
    }


</style>
</head>

<body>
    <header>
        <h2>Alexandre Cavambe</h2>
        <nav>
            <ul id="nav-list">
                <li class="nav-item">
                    <a href="#about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a href="#project">
                        Project
                    </a>

                <li class="nav-item">
                    <a href="#contact">
                        Contact
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section id="about">About</section>
    <section id="project">Project</section>
    <section id="contact">Contact</section>
</body>
</html>
