<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition e Transform</title>
    <style>
        body{
            padding: 50px;
        }
        button{
            background-color: #6369f1;
            color: #fff;
            display: block;
            padding: 12px 24px;
            margin: auto;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.4s, transform 0.4s;

            &:hover{
                background-color: #7e8df8;
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>
    <button>
        Clique aqui
    </button>
</body>
</html>
