<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output</title>
</head>
<body>
    <form action="cadastro.php" method="post" autocomplete="on">
        <div>
            <label for="in1">Number: </label> <br>
            <input type="range" name="" id="num" min="0" max="10" value="5" oninput="ival.innerHTML = Number(num.value)">
            <output id="ival">5</output>
        </div>
        
        
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
