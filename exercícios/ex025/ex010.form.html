<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output</title>
</head>
<body>
    <form action="cadastro.php" method="post" autocomplete="on">
        <div>
            <label for="iano">Em que ano nasceu?</label> <br>
            <input type="number" name="" id="iano" oninput="calcIdade()">
        </div>
        
        <div>
            <label for="idade">Sua idade é: </label> <br>
            <output id="idade">0</output> 
        </div>
        <button type="submit">Enviar</button>
    </form>

    <script>
        function calcIdade(){
            let ano = new Date().getFullYear();

            idade.innerHTML = Number(ano) - Number(iano.value)
        }
    </script>
</body>
</html>
